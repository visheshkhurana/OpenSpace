# Codex CLI config — add this block to ~/.codex/config.toml
# (Codex uses TOML; merge with your existing file.)

[mcp_servers.openspace]
command   = "openspace-mcp"
toolTimeout = 600

[mcp_servers.openspace.env]
OPENSPACE_HOST_SKILL_DIRS = "${HOME}/.openspace/host_skills"
OPENSPACE_WORKSPACE       = "${HOME}/OpenSpace"
OPENSPACE_API_KEY         = "${OPENSPACE_API_KEY}"
OPENAI_API_KEY            = "${OPENAI_API_KEY}"
